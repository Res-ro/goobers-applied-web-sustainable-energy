select<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply</title>
	<img src="images/logo.png" alt = "Goobers Logo" id="logo">
    <link rel="stylesheet" href="/styles/style.css">
  </head>

  <body>
	  <header>
		  <div id = "header">
			<h1>Job Applications</h1>
		  </div>
		  <hr>
		  <nav id="links">
			  <ul>
				<li><a href="index.html">Home</a></li>
				<li><a href="info.html">Information</a></li>
				<li><a href="jobs.html">Jobs</a></li>
				<li><a href="apply.html">Apply</a></li>
				<li><a href="about_us.html">About Us</a></li>
			  </ul>

		  </nav>
	  </header>

	<form action="https://mercury.swin.edu.au/it000000/formtest.php" method="post">
	  
	<main>
		
		<br><br>

		<fieldset>
			<!-- Job Reference Number -->
			<label for="Job_Reference_Number">Job Reference Number:</label>
			<input type="text" id="studentID" name="studentID"
               required pattern="[a-zA-Z0-9]{5}" placeholder="Max of 5 Characters">

			<br><br><br>
			
			<!-- First Name -->
			<label for="First_Name">First Name:</label>
			<input type="text" id="First_Name" name="First_Name"
				required maxlength="20" pattern="[A-Za-z]+"
				placeholder="First name">

			<br><br><br>

			<!-- Last Name  -->
			<label for="Last_Name">Last Name:</label>
			<input type="text" id="Last_Name" name="Last_Name"
				required maxlength="20" pattern="[A-Za-z]+"
				placeholder="Last name">

			<br><br><br>

			<!-- Date of Birth -->
			<label for="DOB">Date Of Birth</label>
			<input type="text" id="dob" name="dob"
				required
				pattern="\d{2}/\d{2}/\d{4}"
				placeholder="dd/mm/yyyy"
				title="Enter date in dd/mm/yyyy format">

			<br><br><br>

		</fieldset>

		<br>

		<fieldset> 
			<!-- Gender -->
			<legend>Select Your Gender</legend>
			<label><input type="radio" name="unit" value="Male" required> Male</label>
			<label><input type="radio" name="unit" value="Female"> Female</label>
			<label><input type="radio" name="unit" value="NonBinary"> Non Binary</label>
			<label><input type="radio" name="unit" value="Undefined"> Prefer not to say</label>

		</fieldset>

		<br><br>

		<fieldset>
			<!-- Street Address -->
			<label for="Street_Address">Street Address:</label>
			<input type="text" id="street_address" name="street_address"
				required maxlength="40" 
				placeholder="e.g. 123 Main St">

			<br><br>

			<!-- Suburb / Town -->
			<label for="suburb">Suburb / Town</label>
			<input type="text" id="suburb" name="suburb"
			required maxlength="40"
			placeholder="e.g. Hawthorn">

			<br><br>

			<!-- State -->
			<label for="state"> State:</label>
			<select id="state" name=""state" required>
				<option value="">--Select State--</option>
				<option value="VIC">VIC</option>
				<option value="NSW">NSW</option>
				<option value="QLD">QLD</option>
				<option value="NT">NT</option>
				<option value="WA">WA</option>
				<option value="SA">SA</option>
				<option value="TAS">TAS</option>
				<option value="ACT">ACT</option>
			</select>

			<br><br>

			<!-- Postcode -->
			<label for="postcode">Postcode</label>
			<input type="text" id="postcode" name="postcode"
				required pattern="\d{4}" maxlength="4"
				placeholder="e.g. 5526">

		</fieldset>

		<br><br>

		<fieldset>
			<!-- Email -->
			<label for="email">Email</label>
			<input type="email" id="email" name="email"
				required
				placeholder="example@gmail.com">
			
			<br><br>

			<!-- Phone Number -->
			 <label for="phone">Phone Number</label>
			 <input type="text" id="phone" name="phone"
			 	required
				pattern="\d{8,12}"
				placeholder="8-12 digits"
				title="Enter a phone number">

		</fieldset>

		<br><br>

		<fieldset>
			<!-- Skill list, Other skills -->
			<label>Skills:</label><br>

			<input type="checkbox" id="example1" name="skills" value="checkbox1">
			<label for="example1">Example1</label><br>

			<input type="checkbox" id="example2" name="skills" value="checkbox2">
			<label for="example2">Example2</label><br>

			<input type="checkbox" id="example3" name="skills" value="checkbox3">
			<label for="example3">Example3</label><br>

			<input type="checkbox" id="example4" name="skills" value="checkbox4">
			<label for="example4">Example4</label><br>

			<br><br>

			<!-- Other Skills -->
			<label for="other_skills">Other Skills</label><br>
			<textarea id="other_skills" name="other_skills"
				rows="4" cols="40"
				placeholder="Enter any other skills here..."></textarea>

		</fieldset>


		<button type="submit">Book</button>
    	<button type="reset">Reset Form</button>

	  </main>
	</form>
	<footer>
		<hr>

  </footer>
  </body>
</html>
