  <body>

<main>
  <section class="application-form">
	    <h2>Job Application Form</h2>
			<form action="http://mercury.swin.edu.au/it000000/formtest.php" method="post">

			<!-- job reference number -->
			<label for="ref_number">Job Reference Number</label>
			<input type="text" id="ref_number" name="ref_number" pattern="\w{5}"
		               maxlength="5" placeholder="12345"><br>

			<!-- Personal Info -->
			<label for="first_name">First Name</label>
			<input type="text" id="first_name" name="first_name"
				pattern=".*" maxlength="20" placeholder="John"><br>

			<label for="last_name">Last Name</label>
			<input type="text" id="last_name" name="last_name"
				pattern=".*" maxlength="20" placeholder="Smith"><br>

			<label for="date_of_birth">Date of Birth</label>
			<input type="text" id="date_of_birth" name="date_of_birth"
				pattern="[0-3]?[1-9]/[0-3]?[1-9]/[0-9]{4}" placeholder="dd/mm/yyyy"><br>
			<fieldset>
				<legend>Gender</legend>
				<input type="radio" name="gender" id="male" value="male" required>
				<label for="gender">Male</label>
				<input type="radio" name="gender" id="female" value="female" required>
				<label for="gender">Female</label>
			</fieldset>

			<!-- Address -->
			<label for="street_address">Street Address</label>
			<input type="text" id="street_address" name="street_address"
				pattern=".*" maxlength="40" placeholder="123 Goober Street"><br>

			<label for="suburb_or_town">Suburb/Town</label>
			<input type="text" id="suburb_or_town" name="suburb_or_town"
				pattern=".*" maxlength="40" placeholder="Hawthorn"><br>

			<label for="state">State</label>
			<select name="state" id="state">
				<option value="VIC">VIC</option>
				<option value="NSW">NSW</option>
				<option value="QLD">QLD</option>
				<option value="NT">NT</option>
				<option value="WA">WA</option>
				<option value="SA">SA</option>
				<option value="TAS">TAS</option>
				<option value="ACT">ACT</option>
			</select><br>

			<label for="postcode">Postcode</label>
			<input type="text" id="postcode" name="postcode"
				pattern="\d{4}" maxlength="4" placeholder="0000"><br>

			<!-- Contact details -->
			<label for="email">Email</label>
			<input type="email" name="email" id="email"><br>

			<label for="phone_number">Phone Number</label>
			<input type="tel" name="phone_number" id="phone_number"
				pattern="\d{8,12}" required><br>

			<!-- Skills info -->

			<label for="skills">HTML</label>
			<input type="checkbox" name="skills[]" id="html"
			       value="HTML" checked="checked">
			<label for="skills">CSS</label>
			<input type="checkbox" name="skills[]" id="css"
			       value="CSS">
			<label for="skills">JavaScript</label>
			<input type="checkbox" name="skills[]" id="javascript"
			       value="JavaScript">
			<label for="skills">PHP</label>
			<input type="checkbox" name="skills[]" id="php"
			       value="PHP">
			<label for="skills">MySQL</label>
			<input type="checkbox" name="skills[]" id="mysql"
			       value="MySQL"><br>

			<label for="other_skills">Other Skills</label>
			<textarea name="other_skills" id="other_skills" rows="5" cols="40"
				  placeholder="Write a description of your skills here..." required></textarea><br><br>

			<button type="submit">Submit</button>

			</form>
  </section>
</main>
